name: build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build the article PDF
    permissions: write-all
    concurrency: showyourwork-${{ github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Zenodo datasets
        uses: actions/cache@v4
        with:
          path: |
            src/data/pluto.tar.gz
            src/data/pop_spock.tar.gz
            src/data/single_spock.tar.gz
          key: zenodo-datasets-${{ hashFiles('showyourwork.yml') }}

      - name: Build the article PDF
        id: build
        uses: showyourwork/showyourwork-action@main
        with:
          showyourwork-spec: git+https://github.com/showyourwork/showyourwork
        env:
          SANDBOX_TOKEN: ${{ secrets.SANDBOX_TOKEN }}
          OVERLEAF_TOKEN: ${{ secrets.OVERLEAF_TOKEN }}
